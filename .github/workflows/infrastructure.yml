name: Infrastructure Pipeline

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Choose Infrastructure Operation"
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy

concurrency:
  group: infrastructure
  cancel-in-progress: false

env:
  TF_DIR: terraform
  ANSIBLE_DIR: ansible
  AI_DIR: ai
  REPORT_DIR: reports

  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

###########################################################
# VALIDATION
###########################################################

jobs:

  validate:

    name: Validate Runner

    runs-on: self-hosted

    steps:

      - uses: actions/checkout@v4

      - name: Runner Details
        run: |
          hostname
          whoami
          pwd

      - name: Terraform
        run: terraform version

      - name: Ansible
        run: ansible --version

      - name: Python
        run: python3 --version

      - name: Azure CLI
        run: az version

      - name: Verify Secrets
        run: |
          test -n "$ARM_CLIENT_ID"
          test -n "$ARM_CLIENT_SECRET"
          test -n "$ARM_SUBSCRIPTION_ID"
          test -n "$ARM_TENANT_ID"
          test -n "$GEMINI_API_KEY"

      - name: Verify Repository
        run: |
          test -d terraform
          test -d ansible
          test -d ai

###########################################################
# TERRAFORM APPLY
###########################################################

  terraform:

    name: Terraform Apply

    if: github.event.inputs.operation == 'apply'

    needs: validate

    runs-on: self-hosted

    defaults:
      run:
        working-directory: terraform

    steps:

      - uses: actions/checkout@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Verify Inventory
        run: |
          test -f ../ansible/inventory.ini

      - name: Upload Inventory
        uses: actions/upload-artifact@v4
        with:
          name: inventory
          path: ansible/inventory.ini

###########################################################
# ANSIBLE
###########################################################

  ansible:

    name: Configure Servers

    if: github.event.inputs.operation == 'apply'

    needs: terraform

    runs-on: self-hosted

    steps:

      - uses: actions/checkout@v4

      - name: Download Inventory
        uses: actions/download-artifact@v4
        with:
          name: inventory
          path: ansible

      - name: Run Playbook
        working-directory: ansible
        run: |

          ansible-playbook \
          -i inventory.ini \
          site.yaml | tee ansible.log

      - name: Upload Log
        uses: actions/upload-artifact@v4
        with:
          name: ansible-log
          path: ansible/ansible.log

###########################################################
# AI REPORT
###########################################################

  ai:

    name: AI Deployment Report

    if: github.event.inputs.operation == 'apply'

    needs: ansible

    runs-on: self-hosted

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Log
        uses: actions/download-artifact@v4
        with:
          name: ansible-log
          path: ansible

      - name: Generate AI Summary
        working-directory: ai
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |

          python -m venv .venv
          source .venv/bin/activate

          python -m pip install --upgrade pip
          pip install -r requirements.txt

          mkdir -p reports

          python parse_ansible.py ../ansible/ansible.log
          python summarize.py

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: |
            reports/deployment.json
            reports/deployment-report.md

      - name: Publish Summary
        run: |

          cat reports/deployment-report.md >> $GITHUB_STEP_SUMMARY

###########################################################
# DESTROY
###########################################################

  destroy:

    name: Terraform Destroy

    if: github.event.inputs.operation == 'destroy'

    needs: validate

    runs-on: self-hosted

    defaults:
      run:
        working-directory: terraform

    steps:

      - uses: actions/checkout@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve